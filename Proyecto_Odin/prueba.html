<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba</title>
</head>
<body>
    <div class="titles and paragrpahs">
        <h1>Que tal mundito!!</h1>
        <p>
            Creando el <strong>fucking mejor</strong> párrafo del <em>mundo.</em>
        </p>
        <!-- <strong> hace que el texto se vea en negrita, mientras que <em> hace que se vea en cursiva -->
        <p>
            Junto al <b>segundo mejor</b> párrafo.
        </p>
        <!-- poniendo 'command + /' podemos poner de forma directa el comentario y nos dejamos de tanta flechita -->
        <!-- Con 'lorem' podemos generar texto random para pruebas -->
    </div>
    <div class="lists">
        <!-- Tenemos dos tipos de listas:
            - <ul> no ordenadas
            - <ol> ordenadas 
                Dentro de cada lista cada item 'fila' iría con el elemento <li> -->
        <ul>
            <li>Item sin ordenar 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
        <ol>
            <li>Item ordenado 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ol>
    </div>
</body>
</html>
